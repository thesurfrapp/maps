name = "surfr-tile-warmer-cron"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Every 5 minutes. Checks upstream latest.json per domain via the Pages
# Function warmer; most ticks are no-ops since model runs publish every
# 1–12 h.
[triggers]
crons = ["*/5 * * * *"]

# Service binding to the rewarmer worker. After a successful per-domain
# warm tick we dispatch one HTTP per validTime through this binding to
# populate Cache Reserve. See src/purge.ts.
[[services]]
binding = "REWARMER"
service = "surfr-tile-rewarmer"

[observability.logs]
enabled = true
invocation_logs = true
