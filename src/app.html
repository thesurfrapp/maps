<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!-- Inline the dark background so the embed doesn't flash white between
		     HTML parse and external CSS load. Mirrors styles.css's :root rule. -->
		<style>
			html, body { background-color: #14141c; margin: 0; }
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
